<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>桶号管理 | Quản lý Barrel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1677ff,#0958d9);color:#fff;padding:12px 16px;text-align:center;font-size:16px;font-weight:700;letter-spacing:1px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.header-title{flex:1;text-align:center}
.lang-btn{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600}
.lang-btn:active{background:rgba(255,255,255,.35)}
.tabs{display:flex;background:#fff;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;border:none;background:none;color:#888;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:#1677ff;border-bottom-color:#1677ff}
.content{flex:1;overflow-y:auto;padding:12px;padding-bottom:16px}
.panel{display:none}
.panel.active{display:block}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-title{font-size:14px;font-weight:700;margin-bottom:8px;color:#222}
.mode-row{display:flex;gap:6px;margin-bottom:8px}
.mode-btn{flex:1;padding:8px;font-size:13px;border:1px solid #d9d9d9;border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-weight:500}
.mode-btn.active{background:#1677ff;color:#fff;border-color:#1677ff}

/* Scan zone */
.scan-zone{background:#fff;border:3px dashed #1677ff;border-radius:14px;padding:20px 16px;text-align:center;margin-bottom:10px;transition:.15s}
.scan-zone.flash{background:#f6ffed;border-color:#52c41a}
.scan-zone .scan-icon{font-size:40px;margin-bottom:8px}
.scan-zone .scan-status{font-size:13px;color:#888;margin-bottom:6px}
.scan-zone .last-scan{font-size:22px;font-weight:800;color:#1677ff;min-height:30px;word-break:break-all}
.scan-zone .last-scan.empty{color:#ccc;font-size:16px;font-weight:400}
.scan-input-real{width:100%;padding:14px;font-size:18px;border:2px solid #d9d9d9;border-radius:10px;text-align:center;background:#fafafa;margin-bottom:4px}
.scan-input-real:focus{outline:none;border-color:#1677ff;background:#fff}
.scan-hint{font-size:11px;color:#bbb}

/* Batch */
.batch-section{margin-bottom:10px}
.batch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.batch-count{font-size:13px;color:#888;font-weight:600}
.batch-list{max-height:160px;overflow-y:auto}
.batch-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#f6f8fa;border-radius:8px;margin-bottom:3px;font-size:13px}
.batch-item .del{color:#ff4d4f;font-size:18px;cursor:pointer;padding:2px 6px;border:none;background:none}

/* Location / Destination grids */
.loc-section{margin-bottom:10px}
.loc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px}
.loc-btn{padding:10px 2px;font-size:12px;border:2px solid #e8e8e8;border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-weight:500}
.loc-btn:active{transform:scale(.94)}
.loc-btn.selected{background:#1677ff;color:#fff;border-color:#1677ff}
.loc-btn.occupied{background:#fff7e6;border-color:#ffa940;color:#d46b08}
.loc-label{font-size:12px;font-weight:700;color:#888;margin-bottom:4px}

.btn{display:block;width:100%;padding:13px;font-size:15px;border:none;border-radius:10px;cursor:pointer;font-weight:600;margin-bottom:8px;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1677ff;color:#fff}
.btn-success{background:#52c41a;color:#fff}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-warning{background:#fa8c16;color:#fff}
.btn-default{background:#f5f5f5;color:#333;border:1px solid #e0e0e0}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-block}
.btn:disabled{opacity:.4;pointer-events:none}

.result{padding:10px 12px;border-radius:8px;margin:8px 0;font-size:13px;line-height:1.5}
.result.success{background:#f6ffed;border:1px solid #b7eb8f;color:#389e0d}
.result.error{background:#fff2f0;border:1px solid #ffccc7;color:#cf1322}
.result.info{background:#e6f4ff;border:1px solid #91caff;color:#0958d9}

table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:7px 5px;text-align:left;border-bottom:1px solid #f0f0f0}
th{background:#fafafa;font-weight:600;color:#888;font-size:11px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:#999}
.info-value{color:#222;font-weight:600;text-align:right}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-in{background:#f6ffed;color:#52c41a}
.badge-out{background:#fff2f0;color:#ff4d4f}
.badge-rg{background:#fff7e6;color:#d46b08}
.badge-fj{background:#e6f4ff;color:#0958d9}
.beep-dot{display:inline-block;width:8px;height:8px;background:#52c41a;border-radius:50%;margin-right:4px;animation:pulse .8s ease-out}
@keyframes pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(2);opacity:0}}

.zone-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;margin-left:4px}
.zone-tag.rg{background:#fff7e6;color:#d46b08}
.zone-tag.fj{background:#e6f4ff;color:#0958d9}
</style>
</head>
<body>

<div class="header">
  <button class="lang-btn" onclick="switchLang()" id="lang-btn">🇻🇳 Tiếng Việt</button>
  <span class="header-title" id="header-title">🏭 生管部在制品桶号管理</span>
  <span style="width:70px"></span>
</div>
<div class="tabs">
  <button class="tab active" data-i18n="tab_inbound" onclick="switchTab('inbound')">📥 入库</button>
  <button class="tab" data-i18n="tab_outbound" onclick="switchTab('outbound')">📤 出库</button>
  <button class="tab" data-i18n="tab_query" onclick="switchTab('query')">🔍 查询</button>
  <button class="tab" data-i18n="tab_logs" onclick="switchTab('logs')">📋 记录</button>
</div>
<div class="content">

<!-- ═══════════ 入库 ═══════════ -->
<div id="panel-inbound" class="panel active">
  <div class="mode-row">
    <button class="mode-btn active" data-i18n="mode_single" onclick="setInboundMode('single')">🔹 单桶</button>
    <button class="mode-btn" data-i18n="mode_batch" onclick="setInboundMode('batch')">🔶 批量</button>
  </div>

  <div class="scan-zone" id="inbound-scan-zone">
    <div class="scan-icon">📷</div>
    <div class="scan-status" id="inbound-scan-status" data-i18n="wait_scan">等待扫码...</div>
    <div class="last-scan empty" id="inbound-last-scan">--</div>
    <input type="text" class="scan-input-real" id="inbound-scanner" data-i18n-placeholder="scan_placeholder" placeholder="扫码枪扫这里..." autocomplete="off">
    <div class="scan-hint" data-i18n="scan_hint">扫码后自动确认，无需点击</div>
  </div>

  <!-- 批量列表 -->
  <div class="card batch-section" id="inbound-batch-card" style="display:none">
    <div class="batch-header">
      <span class="batch-count" id="inbound-batch-count">已扫 0 桶</span>
      <button class="btn-default btn-sm" data-i18n="clear" onclick="clearInboundBatch()">清空</button>
    </div>
    <div class="batch-list" id="inbound-batch-list"></div>
  </div>

  <!-- 单桶入库：储位选择 -->
  <div class="card loc-section" id="inbound-single-loc" style="display:none">
    <div class="card-title">📍 <span id="inbound-single-barrel" style="color:#1677ff">--</span> → <span data-i18n="pick_location">选择储位</span></div>
    <div class="loc-label" data-i18n="loc_a2_label">📦 入库储区 A2 (01~99)</div>
    <div class="loc-grid" id="loc-inbound-single"></div>
    <button class="btn btn-success" id="btn-inbound-single" disabled onclick="confirmSingleInbound()">✅ <span data-i18n="confirm_inbound">确认入库</span></button>
    <button class="btn btn-default" data-i18n="cancel" onclick="cancelSingleInbound()">取消</button>
  </div>

  <!-- 批量入库：储位选择 -->
  <div id="inbound-batch-confirm" style="display:none">
    <div class="card loc-section">
      <div class="card-title" data-i18n="batch_inbound_title">📍 全部入库到哪个储位？</div>
      <div class="loc-label" data-i18n="loc_a2_label">📦 入库储区 A2 (01~99)</div>
      <div class="loc-grid" id="loc-inbound-batch"></div>
      <button class="btn btn-success" id="btn-inbound-batch" disabled onclick="confirmBatchInbound()">✅ <span data-i18n="batch_inbound_btn">全部入库</span></button>
      <button class="btn btn-default" data-i18n="cancel" onclick="cancelBatchInbound()">取消</button>
    </div>
  </div>

  <div id="inbound-msg"></div>
</div>

<!-- ═══════════ 出库 ═══════════ -->
<div id="panel-outbound" class="panel">
  <div class="mode-row">
    <button class="mode-btn active" data-i18n="mode_single" onclick="setOutboundMode('single')">🔹 单桶</button>
    <button class="mode-btn" data-i18n="mode_batch" onclick="setOutboundMode('batch')">🔶 批量</button>
  </div>

  <div class="scan-zone" id="outbound-scan-zone">
    <div class="scan-icon">📷</div>
    <div class="scan-status" id="outbound-scan-status" data-i18n="wait_scan">等待扫码...</div>
    <div class="last-scan empty" id="outbound-last-scan">--</div>
    <input type="text" class="scan-input-real" id="outbound-scanner" data-i18n-placeholder="scan_placeholder" placeholder="扫码枪扫这里..." autocomplete="off">
    <div class="scan-hint" data-i18n="scan_hint">扫码后自动确认，无需点击</div>
  </div>

  <!-- 单桶出库：显示储位 + 选目的地 -->
  <div class="card" id="outbound-single-card" style="display:none">
    <div style="text-align:center;padding:4px 0 8px">
      <div style="font-size:20px;font-weight:800;color:#1677ff" id="outbound-single-barrel">--</div>
      <div style="font-size:13px;color:#888;margin:4px 0" data-i18n="current_location">当前储位</div>
      <div style="font-size:20px;font-weight:700;color:#52c41a" id="outbound-single-from">--</div>
    </div>
    <div class="card-title" data-i18n="pick_dest">🚚 选择出库目的地</div>
    <div class="loc-label" data-i18n="zone_rg">👤 人工区</div>
    <div class="loc-grid" id="dest-rg-single"></div>
    <div class="loc-label" data-i18n="zone_fj">🤖 自动分检区</div>
    <div class="loc-grid" id="dest-fj-single"></div>
    <button class="btn btn-default" data-i18n="cancel" onclick="cancelOutboundSingle()">取消</button>
  </div>

  <!-- 批量出库列表 -->
  <div class="card batch-section" id="outbound-batch-card" style="display:none">
    <div class="batch-header">
      <span class="batch-count" id="outbound-batch-count">已扫 0 桶</span>
      <button class="btn-default btn-sm" data-i18n="clear" onclick="clearOutboundBatch()">清空</button>
    </div>
    <div class="batch-list" id="outbound-batch-list"></div>
  </div>

  <!-- 批量出库：目的地选择 -->
  <div id="outbound-batch-dest" style="display:none">
    <div class="card">
      <div class="card-title" data-i18n="batch_outbound_title">🚚 全部出库到哪个目的地？</div>
      <div class="loc-label" data-i18n="zone_rg">👤 人工区</div>
      <div class="loc-grid" id="dest-rg-batch"></div>
      <div class="loc-label" data-i18n="zone_fj">🤖 自动分检区</div>
      <div class="loc-grid" id="dest-fj-batch"></div>
      <button class="btn btn-danger" onclick="confirmBatchOutbound()">📤 <span data-i18n="batch_outbound_btn">全部出库</span></button>
      <button class="btn btn-default" data-i18n="cancel" onclick="cancelBatchOutbound()">取消</button>
    </div>
  </div>

  <div id="outbound-msg"></div>
</div>

<!-- ═══════════ 查询 ═══════════ -->
<div id="panel-query" class="panel">
  <div class="card">
    <div class="card-title" data-i18n="query_title">🔍 库存查询</div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input type="text" class="scan-input-real" id="query-input" data-i18n-placeholder="query_placeholder" placeholder="输入桶号或储位，回车查询" style="margin-bottom:0;flex:1">
      <button class="btn btn-primary btn-sm" onclick="searchInventory()" style="width:auto;margin-bottom:0;padding:12px 16px;white-space:nowrap">🔍 <span data-i18n="query_btn">搜索</span></button>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-default btn-sm" style="flex:1" onclick="loadAllInventory()">📦 <span data-i18n="all_inventory">全部在库</span></button>
      <a class="btn btn-warning btn-sm" href="/api/export" style="flex:1;text-decoration:none;text-align:center" data-i18n="export_excel">📥 导出 Excel</a>
    </div>
    <div id="query-result"></div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="delete_title">🗑 删除桶号</div>
    <div class="mode-row">
      <button class="mode-btn active" data-i18n="mode_single" onclick="setDeleteMode('single')">🔹 单桶</button>
      <button class="mode-btn" data-i18n="mode_batch" onclick="setDeleteMode('batch')">🔶 批量</button>
    </div>
    <input type="text" class="scan-input-real" id="delete-input" data-i18n-placeholder="delete_placeholder" placeholder="扫码或输入桶号，回车确认" style="margin-bottom:8px">
    <!-- 单桶确认 -->
    <div id="delete-single-confirm" style="display:none">
      <div class="result info" id="delete-single-info"></div>
      <button class="btn btn-danger" data-i18n="confirm_delete_one" onclick="confirmDeleteSingle()">⚠️ 确认删除此桶号</button>
      <button class="btn btn-default" data-i18n="cancel" onclick="cancelDelete()">取消</button>
    </div>
    <!-- 批量列表 -->
    <div id="delete-batch-section" style="display:none">
      <div class="batch-header">
        <span class="batch-count" id="delete-batch-count">已选 0 桶</span>
        <button class="btn-default btn-sm" data-i18n="clear" onclick="clearDeleteBatch()">清空</button>
      </div>
      <div class="batch-list" id="delete-batch-list"></div>
      <button class="btn btn-danger" data-i18n="confirm_delete_all" onclick="confirmDeleteBatch()">⚠️ 确认删除全部</button>
    </div>
    <div id="delete-msg"></div>
  </div>
</div>

<!-- ═══════════ 记录 ═══════════ -->
<div id="panel-logs" class="panel">
  <div class="card">
    <div class="card-title" data-i18n="logs_title">📋 最近操作记录</div>
    <div id="logs-content"></div>
  </div>
</div>

</div>

let LANG = localStorage.getItem('barrel_lang') || 'zh';

function t(key, ...args) {
  let text = (I18N[LANG] && I18N[LANG][key]) || key;
  args.forEach((a, i) => { text = text.replace('#', a); });
  return text;
}

function applyLang() {
  // HTML data-i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[LANG] && I18N[LANG][key]) el.textContent = I18N[LANG][key];
  });
  // Placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (I18N[LANG] && I18N[LANG][key]) el.placeholder = I18N[LANG][key];
  });
  // Header
  document.getElementById('header-title').textContent = t('header_title');
  document.getElementById('lang-btn').textContent = t('lang_switch');
  // Buttons that have nested spans for i18n need the span updated, the buttons themselves have text+span
  // Re-apply the buttons with nested i18n spans
  const ib = document.getElementById('btn-inbound-single');
  if (ib) ib.innerHTML = '✅ <span data-i18n="confirm_inbound">' + t('confirm_inbound') + '</span>';
  const ibb = document.getElementById('btn-inbound-batch');
  if (ibb) ibb.innerHTML = '✅ <span data-i18n="batch_inbound_btn">' + t('batch_inbound_btn') + '</span>';
  // Refresh dynamic content
  if (inboundMode === 'batch') renderInboundBatch();
  if (outboundMode === 'batch') renderOutboundBatch();
  if (deleteMode === 'batch') renderDeleteBatch();
  // Refresh logs if visible
  if (document.getElementById('panel-logs').classList.contains('active')) loadLogs();
}

function switchLang() {
  LANG = LANG === 'zh' ? 'vi' : 'zh';
  localStorage.setItem('barrel_lang', LANG);
  applyLang();
}

// Apply on load
applyLang();

// ─── 储位/目的地网格生成 ────────────────────────────────

function buildInboundGrid(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  let html = '';
  for (let i = 1; i <= 99; i++) {
    const loc = 'A2-' + String(i).padStart(2, '0');
    const occ = occupiedLocations[loc] ? ' occupied' : '';
    const star = occupiedLocations[loc] ? '*' : '';
    html += `<button class="loc-btn${occ}" data-loc="${loc}" onclick="pickInboundLoc('${loc}', this, '${containerId}')">${loc}${star}</button>`;
  }
  el.innerHTML = html;
}

function pickInboundLoc(loc, btn, containerId) {
  if (occupiedLocations[loc]) {
    if (!confirm(t('loc_occupied_hint', loc, occupiedLocations[loc]))) return;
  }
  document.querySelectorAll('#' + containerId + ' .loc-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  if (containerId === 'loc-inbound-single') {
    selectedInboundLoc = loc;
    document.getElementById('btn-inbound-single').disabled = false;
  } else {
    selectedBatchLoc = loc;
    document.getElementById('btn-inbound-batch').disabled = false;
  }
}

function buildDestGrid(rgContainerId, fjContainerId) {
  const rgEl = document.getElementById(rgContainerId);
  const fjEl = document.getElementById(fjContainerId);
  if (!rgEl || !fjEl) return;
  let rgHtml = '', fjHtml = '';
  for (let i = 1; i <= 10; i++) {
    const rg = 'RG' + String(i).padStart(2, '0');
    const fj = 'FJ' + String(i).padStart(2, '0');
    rgHtml += `<button class="loc-btn" data-dest="${rg}" onclick="pickDest('${rg}', this, '${rgContainerId}', '${fjContainerId}')">${rg}</button>`;
    fjHtml += `<button class="loc-btn" data-dest="${fj}" onclick="pickDest('${fj}', this, '${rgContainerId}', '${fjContainerId}')">${fj}</button>`;
  }
  rgEl.innerHTML = rgHtml;
  fjEl.innerHTML = fjHtml;
}

function pickDest(dest, btn, rgId, fjId) {
  document.querySelectorAll('#' + rgId + ' .loc-btn, #' + fjId + ' .loc-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  if (rgId === 'dest-rg-single') {
    selectedOutboundDest = dest;
    executeSingleOutbound();
  } else {
    selectedBatchDest = dest;
  }
}

async function refreshOccupied() {
  try {
    const resp = await fetch(API + '/api/inventory');
    const data = await resp.json();
    occupiedLocations = {};
    data.forEach(d => { occupiedLocations[d.location] = d.barrel_no; });
  } catch(e) {}
}

// ─── 音效/反馈 ──────────────────────────────────────────

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800; osc.type = 'sine'; gain.gain.value = 0.15;
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

function flashZone(id) {
  const el = document.getElementById(id);
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 300);
}

function showLastScan(id, text) {
  const el = document.getElementById(id);

  el.classList.remove('empty');
}

async function confirmSingleInbound() {
  if (!inboundSingleBarrel || !selectedInboundLoc) return;
  const resp = await fetch(API + '/api/inbound', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ barrel_no: inboundSingleBarrel, location: selectedInboundLoc })
  });
  const data = await resp.json();
  let msg;
  if (data.success) {
    msg = t('inbound_ok', inboundSingleBarrel, selectedInboundLoc);
  } else {
    // Translate backend error message
    msg = translateMsg(data.msg);
  }
  document.getElementById('inbound-msg').innerHTML = `<div class="result ${data.success ? 'success' : 'error'}">${msg}</div>`;
  inboundSingleBarrel = null; selectedInboundLoc = null;
  document.getElementById('inbound-single-loc').style.display = 'none';
  refreshOccupied();
  setTimeout(() => { document.getElementById('inbound-msg').innerHTML = ''; }, 2000);
  document.getElementById('inbound-scanner').focus();
}

// Translate backend Chinese messages
function translateMsg(msg) {
  if (LANG === 'zh') return msg;
  // Common patterns from backend
  if (msg.includes('不在库中')) {
    const m = msg.match(/桶号 (\S+) 不在库中/);
    if (m) return t('not_in_stock_msg', m[1]);
  }
  if (msg.includes('已在')) {
    const m = msg.match(/桶号 (\S+) 已在 (\S+)/);
    if (m) return t('already_in_msg', m[1], m[2]);
  }
  // Fallback: try to keep numbers
  return msg;
}

}

function removeDeleteBatch(i) { deleteBatch.splice(i, 1); renderDeleteBatch(); }
function clearDeleteBatch() { deleteBatch = []; renderDeleteBatch(); }

async function confirmDeleteBatch() {
  if (deleteBatch.length === 0) return;
  if (!confirm(t('confirm_delete_batch', deleteBatch.length))) return;
  const resp = await fetch(API + '/api/barrel/delete/batch', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ barrel_nos: deleteBatch })
  });
  const data = await resp.json();
  let msg = t('batch_delete_ok', data.deleted.length);
  if (data.not_found.length > 0) msg += '<br>' + t('batch_delete_not_found', data.not_found.length);
  document.getElementById('delete-msg').innerHTML = `<div class="result success">${msg}</div>`;
  deleteBatch = [];
  renderDeleteBatch();
  refreshOccupied();
  setTimeout(() => { document.getElementById('delete-msg').innerHTML = ''; }, 3000);
  document.getElementById('delete-input').focus();
}

// ─── 标签切换 ──────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['inbound','outbound','query','logs'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');

  if (tab === 'inbound') { refreshOccupied(); setTimeout(() => document.getElementById('inbound-scanner').focus(), 100); }
  if (tab === 'outbound') setTimeout(() => document.getElementById('outbound-scanner').focus(), 100);
  if (tab === 'query') setTimeout(() => document.getElementById('query-input').focus(), 100);
  if (tab === 'logs') loadLogs();
}

// ─── 查询 ──────────────────────────────────────────────

document.getElementById('query-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.keyCode === 13 || e.code === 'Enter') { e.preventDefault(); searchInventory(); }
});

async function searchInventory() {
  const val = document.getElementById('query-input').value.trim();
  if (!val) return;
  document.getElementById('query-input').value = '';
  const r1 = await fetch(API + '/api/inventory/' + encodeURIComponent(val));
  if (r1.ok) {
    const data = await r1.json();
    if (data.length === 0) {
      document.getElementById('query-result').innerHTML = `<div class="result error">${t('not_found')}: ${val}</div>`;
    } else if (data.length === 1) {
      const d = data[0];
      document.getElementById('query-result').innerHTML = `
        <div class="result info">
          <div class="info-row"><span class="info-label">${t('barrel_no')}</span><span class="info-value">🛢 ${d.barrel_no}</span></div>
          <div class="info-row"><span class="info-label">${t('location')}</span><span class="info-value">📍 ${d.location}</span></div>
          <div class="info-row"><span class="info-label">${t('status')}</span><span class="info-value"><span class="badge badge-${d.status==='in'?'in':'out'}">${d.status==='in' ? t('status_in') : t('status_out')}</span></span></div>
          <div class="info-row"><span class="info-label">${t('update_time')}</span><span class="info-value">${d.update_time}</span></div>
        </div>`;
    } else {
      let html = `<div class="result info"><strong>${t('match_results', val, data.length)}</strong>`;
      data.forEach(d => {
        const badge = d.status==='in' ? `<span class="badge badge-in">${t('status_in')}</span>` : `<span class="badge badge-out">${t('status_out')}</span>`;
        html += `<div class="info-row"><span>🛢 ${d.barrel_no}</span><span>📍 ${d.location}</span>${badge}</div>`;
      });
      html += '</div>';
      document.getElementById('query-result').innerHTML = html;
    }
    document.getElementById('query-input').focus();
    return;
  }
  document.getElementById('query-result').innerHTML = `<div class="result error">${t('not_found')}: ${val}</div>`;
  document.getElementById('query-input').focus();
}

async function loadAllInventory() {
  const resp = await fetch(API + '/api/inventory');
  const data = await resp.json();
  if (data.length === 0) {
    document.getElementById('query-result').innerHTML = `<div class="result info">${t('no_inventory')}</div>`;
    return;
  }
  let html = `<table><thead><tr><th>${t('barrel_no')}</th><th>${t('location')}</th><th>${t('time')}</th></tr></thead><tbody>`;
  data.forEach(d => {
    html += `<tr><td>🛢 ${d.barrel_no}</td><td>📍 ${d.location}</td><td style="color:#999;font-size:11px">${d.update_time}</td></tr>`;
  });
  html += `</tbody></table><div style="margin-top:6px;color:#999;font-size:12px;text-align:center">${t('total_in_stock', data.length)}</div>`;
  document.getElementById('query-result').innerHTML = html;
}

// ─── 操作记录 ──────────────────────────────────────────

async function loadLogs() {
  const resp = await fetch(API + '/api/logs?limit=50');
  const data = await resp.json();
  if (data.length === 0) {
    document.getElementById('logs-content').innerHTML = `<div class="result info">${t('no_records')}</div>`;
    return;
  }
  let html = `<table><thead><tr><th>${t('op_time')}</th><th>${t('barrel_no')}</th><th>${t('action')}</th><th>${t('location')}</th><th>${t('dest')}</th></tr></thead><tbody>`;
  data.forEach(d => {
    const actionMap = { '入库': '📥 ' + t('action_inbound'), '出库': '📤 ' + t('action_outbound'), '删除': '🗑 ' + t('action_delete') };
    const actionText = actionMap[d.action] || d.action;
    const destTag = d.destination
      ? (d.destination.startsWith('RG') ? `<span class="zone-tag rg">👤${d.destination}</span>` : `<span class="zone-tag fj">🤖${d.destination}</span>`)
      : '';
    html += `<tr>
      <td style="color:#999;font-size:11px;white-space:nowrap">${d.created_at}</td>
      <td>${d.barrel_no}</td>
      <td>${actionText}</td>
      <td>${d.location}</td>
      <td>${destTag}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('logs-content').innerHTML = html;
}

// ─── 防止输入框失焦 ─────────────────────────────────────

document.addEventListener('click', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
  const activePanel = document.querySelector('.panel.active');
  if (!activePanel) return;
  if (activePanel.id === 'panel-inbound') setTimeout(() => document.getElementById('inbound-scanner').focus(), 50);
  else if (activePanel.id === 'panel-outbound') setTimeout(() => document.getElementById('outbound-scanner').focus(), 50);
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    const ap = document.querySelector('.panel.active');
    if (ap && ap.id === 'panel-inbound') document.getElementById('inbound-scanner').focus();
    if (ap && ap.id === 'panel-outbound') document.getElementById('outbound-scanner').focus();
  }
});

// ─── 启动 ──────────────────────────────────────────────
refreshOccupied();
document.getElementById('inbound-scanner').focus();
</script>
</body>
</html>
